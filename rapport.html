<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4P Mental — Rapport</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background: #f0f4ff; color: #1a2a4a; }
.no-print { }
@media print {
  .no-print { display: none !important; }
  body { background: #fff; }
  .page-break { page-break-before: always; }
}
.topbar { background: linear-gradient(135deg,#0f2244,#1B3A6B); padding: 14px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.topbar-brand { font-family: Georgia, serif; font-size: 20px; font-weight: 700; color: #fff; }
.topbar-brand span { color: #C9A84C; }
.btn-print { padding: 10px 20px; background: linear-gradient(135deg,#C9A84C,#E8C56A); color: #0f2244; border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; }
.btn-back { padding: 10px 20px; background: transparent; color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-size: 14px; cursor: pointer; text-decoration: none; display:inline-flex; align-items:center; }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; }
.loading { text-align: center; padding: 60px; color: #6c7a99; font-size: 16px; }
.report-header { background: linear-gradient(135deg, #0f2244, #1B3A6B); color: #fff; border-radius: 20px; padding: 32px; text-align: center; margin-bottom: 20px; }
.report-header .eyebrow { font-size: 11px; letter-spacing: 0.3em; color: #C9A84C; text-transform: uppercase; margin-bottom: 8px; }
.report-header h1 { font-family: Georgia, serif; font-size: 26px; margin-bottom: 6px; }
.report-header .subtitle { opacity: 0.7; font-size: 14px; }
.score-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.score-card { background: #fff; border-radius: 16px; padding: 18px; text-align: center; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
.score-card .test-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 800; color: #fff; margin-bottom: 10px; }
.score-card .score-num { font-family: Georgia, serif; font-size: 42px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.score-card .score-label { font-size: 11px; color: #6c7a99; font-weight: 600; }
.score-card .profil { font-size: 13px; font-weight: 700; color: #1a2a4a; margin-top: 6px; }
.section { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
.section h2 { font-size: 15px; font-weight: 800; color: #1a2a4a; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e8edf5; }
.dim-row { margin-bottom: 12px; }
.dim-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
.dim-name { font-weight: 700; color: #22366c; }
.dim-val { font-weight: 800; }
.dim-bar { height: 8px; background: #e8edf5; border-radius: 999px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 999px; }
.insight { padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.meta-item { background: #f8faff; border-radius: 10px; padding: 10px 14px; }
.meta-label { font-size: 10px; font-weight: 700; color: #a0aec0; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.meta-value { font-size: 14px; font-weight: 700; color: #1a2a4a; }
.empty { text-align: center; padding: 40px; color: #a0aec0; font-size: 15px; }
.footer-print { text-align: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f4; font-size: 11px; color: #a0aec0; }
</style>
</head>
<body>

<div class="no-print">
  <div class="topbar">
    <div class="topbar-brand">A4P · <span>Mental Club</span></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="index.html" class="btn-back">← Retour</a>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimer / PDF</button>
    </div>
  </div>
</div>

<div class="container" id="report-container">
  <div class="loading">Chargement du rapport...</div>
</div>

<script>
const { createClient } = supabase
const sb = createClient(
  'https://uambqnxbjgukcqbrlops.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhbWJxbnhiamd1a2NxYnJsb3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODE5NjksImV4cCI6MjA5MDE1Nzk2OX0.NhIi_oM7-uivanX5lekkby88t8redOnqxQjhXHRv5J4'
)

const COLORS = { PMP:'#2f4a8a', MPA:'#1a3a6a', CMP:'#1a4a2a', PSYCHO:'#4a1a6a' }

async function loadReport() {
  // Récupérer les paramètres URL
  const params = new URLSearchParams(window.location.search)
  const targetUserId = params.get('uid')
  const targetTest = params.get('test')

  if (!targetUserId) {
    document.getElementById('report-container').innerHTML = '<div class="empty">Paramètres manquants.<br><br><a href="index.html" style="color:#1B3A6B;font-weight:700;">← Retour</a></div>'
    return
  }

  // Charger les résultats
  let query = sb.from('resultats').select('*').eq('utilisateur_id', targetUserId).order('completed_at', { ascending: false })
  if (targetTest) query = query.eq('test_type', targetTest)
  const { data: resultats } = await query

  // Charger le profil du joueur
  const { data: joueur } = await sb.from('utilisateurs').select('*').eq('id', targetUserId).single()
  const nom = joueur ? (joueur.prenom + ' ' + joueur.nom) : 'Sportif'

  // Charger l'équipe
  let equipeNom = '—'
  if (joueur && joueur.equipe_id) {
    const { data: eq } = await sb.from('equipes').select('nom').eq('id', joueur.equipe_id).single()
    if (eq) equipeNom = eq.nom
  }

  const date = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })
  const container = document.getElementById('report-container')

  if (!resultats || resultats.length === 0) {
    container.innerHTML = '<div class="empty">Aucun résultat trouvé pour ce joueur.</div>'
    return
  }

  let html = ''

  // Header
  html += '<div class="report-header">'
  html += '<div class="eyebrow">Rapport de diagnostic mental</div>'
  html += '<h1>' + nom + '</h1>'
  html += '<div class="subtitle">Équipe : ' + equipeNom + ' · ' + date + '</div>'
  html += '</div>'

  // Scores synthèse
  html += '<div class="score-section">'
  resultats.forEach(r => {
    const color = COLORS[r.test_type] || '#1B3A6B'
    html += '<div class="score-card">'
    html += '<div class="test-badge" style="background:' + color + '">' + r.test_type + '</div>'
    html += '<div class="score-num" style="color:' + color + '">' + (r.score_global || '—') + '</div>'
    html += '<div class="score-label">/ 100</div>'
    html += '<div class="profil">' + (r.profil_label || r.profil_code || '—') + '</div>'
    html += '</div>'
  })
  html += '</div>'

  // Détail de chaque test
  resultats.forEach((r, idx) => {
    const color = COLORS[r.test_type] || '#1B3A6B'
    const dateTest = r.completed_at ? new Date(r.completed_at).toLocaleDateString('fr-FR') : '—'

    if (idx > 0) html += '<div class="page-break"></div>'

    html += '<div class="section">'
    html += '<h2 style="color:' + color + '">Test ' + r.test_type + ' — ' + (r.profil_label || '—') + '</h2>'

    // Infos
    html += '<div class="meta-grid" style="margin-bottom:14px;">'
    html += '<div class="meta-item"><div class="meta-label">Score global</div><div class="meta-value" style="color:' + color + ';font-size:20px;">' + (r.score_global || '—') + '/100</div></div>'
    html += '<div class="meta-item"><div class="meta-label">Profil</div><div class="meta-value">' + (r.profil_label || '—') + '</div></div>'
    html += '<div class="meta-item"><div class="meta-label">Code</div><div class="meta-value">' + (r.profil_code || '—') + '</div></div>'
    html += '<div class="meta-item"><div class="meta-label">Date de passation</div><div class="meta-value">' + dateTest + '</div></div>'
    html += '</div>'

    // Scores par dimension si disponibles
    if (r.scores && typeof r.scores === 'object') {
      html += '<div style="margin-top:14px;">'
      Object.entries(r.scores).forEach(([dim, val]) => {
        if (typeof val !== 'number') return
        html += '<div class="dim-row">'
        html += '<div class="dim-header"><span class="dim-name">' + dim + '</span><span class="dim-val" style="color:' + color + '">' + val + '%</span></div>'
        html += '<div class="dim-bar"><div class="dim-fill" style="width:' + val + '%;background:' + color + '"></div></div>'
        html += '</div>'
      })
      html += '</div>'
    }

    html += '</div>'
  })

  // Footer
  html += '<div class="footer-print">Document confidentiel · A4P Mental · Académie de Performances · Alexandre Griffet · ' + date + '</div>'

  container.innerHTML = html
}

loadReport()
</script>

</body>
</html>
